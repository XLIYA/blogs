<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="tailwind.js"></script>
</head>

<body>
    <main class="min-h-screen bg-slate-800 p-8">
        <div class="w-full">

            <h3 class="text-5xl font-extrabold text-cyan-400 mb-8">
                My Weblog
            </h3>

            <div class="w-full flex flex-col md:flex-row gap-6 items-center">

                <input id="search-blog-input" type="search" placeholder="Search blogs..."
                    class="w-full md:flex-1 h-16 px-6 rounded-2xl bg-slate-600 border border-slate-500 text-white placeholder:text-slate-200 text-lg outline-none focus:border-cyan-400 focus:ring-4 focus:ring-cyan-400/20 backdrop-blur-sm" />

                <button id="add-new-blog" type="button"
                    class="w-full md:w-auto h-16 px-10 rounded-2xl text-white font-bold text-lg bg-gradient-to-r from-blue-400 to-purple-400 hover:scale-105 duration-300">
                    Add New Blog
                </button>

            </div>

        </div>
        <div id="blogs-card" class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">

        </div>
        <script type="module" src="index.js"></script>
    </main>
</body>

</html>
