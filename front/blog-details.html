<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Details</title>
    <script src="tailwind.js"></script>
</head>

<body>
    <main class="min-h-screen bg-slate-900 flex items-center justify-center p-6">

        <section
            class="w-full max-w-4xl rounded-[36px] border border-slate-600 bg-slate-800/80 p-10 shadow-2xl">

            <button id="back-button"
                class="mb-10 text-cyan-400 text-2xl font-bold hover:text-cyan-300 transition">
                ← Back
            </button>

            <h1 id="blog-detail-title"
                class="text-5xl font-extrabold text-white mb-8">
            </h1>

            <p id="blog-detail-date"
                class="text-slate-400 text-2xl font-bold mb-10">
            </p>

            <img id="blog-detail-image"
                src=""
                alt=""
                class="w-full h-[360px] object-cover rounded-3xl mb-10">

            <p id="blog-detail-description"
                class="text-slate-300 text-2xl leading-10 font-semibold">
            </p>

        </section>

        <script type="module" src="index.js"></script>
    </main>
</body>

</html>
